#   - torch/torchvision은 반드시 --index-url https://download.pytorch.org/whl/cu132
#   - numpy는 반드시 1.x (Ubuntu 24.04 시스템 matplotlib/OpenCV 호환)
#   - pip OpenCV는 절대 설치하지 말 것 (JetPack의 CUDA-OpenCV를
#     --system-site-packages 로 상속받음)
