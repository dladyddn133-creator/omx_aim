name: scout_to_waffle_bridge

# Burger 의 DOMAIN_ID (팀원에게 확인 필요!)
from_domain: 20   # 예시. 팀원이 쓰는 값
to_domain: 28     # 우리 시스템

topics:
  /scout/map:
    type: nav_msgs/msg/OccupancyGrid
    qos:
      reliability: reliable
      durability: transient_local   # ← 중요! map 은 latched
  
  /scout/risk_map:
    type: nav_msgs/msg/OccupancyGrid
    qos:
      reliability: reliable
      durability: transient_local